name: Package skill

# Builds a Cowork-installable `.skill` file (a zip of the skill folder with
# SKILL.md at its root) and attaches it to the GitHub Release for each tag.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate frontmatter (no angle brackets)
        run: |
          # Cowork's validator parses <...> in the frontmatter as XML tags and
          # rejects the .skill. Fail fast if any appear between the first two ---.
          fm=$(awk '/^---$/{c++; next} c==1{print} c==2{exit}' SKILL.md)
          if echo "$fm" | grep -n '<[^>]*>'; then
            echo "::error::SKILL.md frontmatter contains angle brackets (<...>), which Cowork rejects. Use [brackets] instead."
            exit 1
          fi
          echo "Frontmatter OK — no angle brackets."

      - name: Build .skill archive
        run: |
          # git archive excludes .git and untracked files, and prefixes every
          # path with things-app/ so SKILL.md sits at the archive root.
          git archive --format=zip --prefix=things-app/ -o things-app.skill HEAD
          echo "Archive contents:"
          unzip -l things-app.skill
          # Fail the build if the layout is wrong.
          unzip -l things-app.skill | grep -q 'things-app/SKILL.md'

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: things-app.skill
